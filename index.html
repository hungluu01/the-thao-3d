        /* HỆ THỐNG NỀN LUỒNG NĂNG LƯỢNG CHẠY BỘ (RUNNING ENERGY DUST) */
        .running-canvas-container { position: fixed; inset: 0; pointer-events: none; z-index: 1; opacity: 0.85; }

        /* SÓNG CLICK CHUỘT ĐA TẦNG SIÊU MƯỢT (QUANTUM RIPPLE MULTI-LAYER) */
        .ripple-layer {
            position: fixed; border-radius: 50%; pointer-events: none;
            transform: translate(-50%, -50%) scale(0); opacity: 1; z-index: 9999;
        }
        .ripple-core {
            border: 2px solid rgba(249, 115, 22, 0.6);
            background: radial-gradient(circle, rgba(249,115,22,0.15) 0%, rgba(0,0,0,0) 70%);
            animation: rippleAnimCore 0.7s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }
        .ripple-aura {
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: rippleAnimAura 0.9s cubic-bezier(0.1, 0.6, 0.2, 1) forwards;
        }
        @keyframes rippleAnimCore {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(12); opacity: 0; }
        }
        @keyframes rippleAnimAura {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0.6; }
            100% { transform: translate(-50%, -50%) scale(22); opacity: 0; }

<body onmousedown="triggerQuantumRipple(event)">

    <div class="running-canvas-container">
        <canvas id="runningTelemetryNet"></canvas>
    </div>

    <script>
        // Thiết lập Hệ thống hạt sáng mô phỏng gió và luồng động lực học chạy bộ
        const canvas = document.getElementById('runningTelemetryNet');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const particles = [];
        const particleCount = 80;

        for (let i = 0; i < particleCount; i++) {
            particles.push({
                x: Math.random() * width,
                y: Math.random() * height,
                speedX: Math.random() * 1.5 + 0.5, // Luôn đẩy về phía trước như đang chạy
                speedY: (Math.random() - 0.5) * 0.5,
                radius: Math.random() * 2 + 0.5,
                alpha: Math.random() * 0.5 + 0.2
            });
        }

        let mousePointer = { x: -1000, y: -1000 };
        document.addEventListener('mousemove', (e) => {
            mousePointer.x = e.clientX;
            mousePointer.y = e.clientY;
        });

        function animateTelemetryNet() {
            ctx.clearRect(0, 0, width, height);
            
            // Vẽ đường lưới tọa độ cơ sinh học mờ
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.02)';
            ctx.lineWidth = 1;
            for(let x = 0; x < width; x += 60) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke();
            }

            // Cập nhật các hạt năng lượng tốc độ
            particles.forEach(p => {
                p.x += p.speedX;
                p.y += p.speedY;

                if (p.x > width) p.x = 0;
                if (p.y > height || p.y < 0) p.y = Math.random() * height;

                // Tương tác hạt hút đẩy nhẹ khi quét chuột qua
                const dx = mousePointer.x - p.x;
                const dy = mousePointer.y - p.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if(dist < 120) {
                    p.x -= (dx / dist) * 2;
                    p.y -= (dy / dist) * 2;
                }

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(249, 115, 22, ${p.alpha})`; // Màu cam Runner đặc trưng
                ctx.fill();
            });

            requestAnimationFrame(animateTelemetryNet);
        }
        animateTelemetryNet();

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // Kích hoạt sóng click chuột đa tầng mượt mà
        function triggerQuantumRipple(e) {
            const core = document.createElement('div');
            core.className = 'ripple-layer ripple-core';
            core.style.left = `${e.clientX}px`;
            core.style.top = `${e.clientY}px`;
            core.style.width = '20px'; core.style.height = '20px';

            const aura = document.createElement('div');
            aura.className = 'ripple-layer ripple-aura';
            aura.style.left = `${e.clientX}px`;
            aura.style.top = `${e.clientY}px`;
            aura.style.width = '20px'; aura.style.height = '20px';

            document.body.appendChild(core);
            document.body.appendChild(aura);

            core.addEventListener('animationend', () => core.remove());
            aura.addEventListener('animationend', () => aura.remove());
        }
    </script>
