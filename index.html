    <style>
        body { background-color: #030305; color: #fff; overflow-x: hidden; margin: 0; padding: 0; font-family: 'Barlow', sans-serif; position: relative; }

        /* ĐỒ HỌA KÍNH LỎNG & GLOW GLOW HƯỚNG TƯƠNG LAI */
        .liquid-card {
            background: rgba(255, 255, 255, 0.01);

        /* HIỆU ỨNG GRAVITY DUST & CHUYỂN ĐỘNG THEO CHUỘT */
        .gravity-dust { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 1; opacity: 0.8; }
        .dust { position: absolute; background: rgba(255,255,255,0.4); border-radius: 50%; opacity: 0; animation: floatDust 8s infinite linear; }
        .future-block { position: absolute; border: 1px solid rgba(255,255,255,0.03); background: rgba(255,255,255,0.005); transition: transform 0.1s ease-out; z-index: 0; }

        @keyframes floatDust {
            0% { opacity: 0; transform: translateY(120px) scale(0.4); }
            50% { opacity: 0.5; }
            100% { opacity: 0; transform: translateY(-160px) scale(1.1); }
        }

        /* HIỆU ỨNG SÓNG CLICK (QUANTUM CLICK RIPPLE) */
        .click-ripple {
            position: fixed; width: 10px; height: 10px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            pointer-events: none; transform: translate(-50%, -50%) scale(0);
            animation: clickRippleEffect 0.6s ease-out; z-index: 9999;
        }
        @keyframes clickRippleEffect {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(15); opacity: 0; }
        }
    </style>

<body onmousedown="createClickRipple(event)">
    <div class="gravity-dust" id="gravityDust"></div>
    <script>
        // Khởi tạo Bụi Trọng Lực & Khối Tương Lai 3D
        const dustField = document.getElementById('gravityDust');
        const numDust = 60; const numBlocks = 10; const blocks = [];

        for (let i = 0; i < numDust; i++) {
            const d = document.createElement('div');
            d.className = 'dust';
            d.style.width = `${Math.random() * 3 + 1}px`;
            d.style.height = d.style.width;
            d.style.left = `${Math.random() * 100}%`;
            d.style.top = `${Math.random() * 100}%`;
            d.style.animationDelay = `${Math.random() * 8}s`;
            dustField.appendChild(d);
        }

        for (let i = 0; i < numBlocks; i++) {
            const b = document.createElement('div');
            b.className = 'future-block';
            b.style.width = `${Math.random() * 100 + 40}px`;
            b.style.height = b.style.width;
            b.style.left = `${Math.random() * 100}%`;
            b.style.top = `${Math.random() * 100}%`;
            b.style.borderRadius = `${Math.random() * 30}%`;
            b.style.transform = `rotate(${Math.random() * 360}deg)`;
            dustField.appendChild(b);
            blocks.push({ el: b, x: Math.random() * 100, y: Math.random() * 100, speed: Math.random() * 15 + 5 });
        }

        // Xử lý di chuyển Khối Tương Lai theo trỏ chuột (Gravity)
        document.addEventListener('mousemove', (e) => {
            const mouseX = e.clientX / window.innerWidth * 100;
            const mouseY = e.clientY / window.innerHeight * 100;
            blocks.forEach(block => {
                const shiftX = (mouseX - block.x) / block.speed;
                const shiftY = (mouseY - block.y) / block.speed;
                block.el.style.transform += `translate(${shiftX}px, ${shiftY}px)`;
            });
        });

        // Xử lý hiệu ứng Sóng Click (Click Ripple)
        function createClickRipple(e) {
            const ripple = document.createElement('div');
            ripple.className = 'click-ripple';
            ripple.style.left = `${e.clientX}px`;
            ripple.style.top = `${e.clientY}px`;
            document.body.appendChild(ripple);
            ripple.addEventListener('animationend', () => ripple.remove());
        }
    </script>

    <div id="root"></div>

                <section className="relative w-full py-32 px-6 md:px-16 border-t border-white/5 z-10">
                    <div className="max-w-6xl mx-auto w-full">
                        <span className="text-[10px] font-bold tracking-widest uppercase text-white/40 block mb-4">// TRẠM ĐIỀU HÀNH TRI THỨC VÀ ĐÀO TẠO</span>
                        <h2 className="font-heading italic text-5xl md:text-7xl text-white leading-none tracking-tight mb-16 uppercase select-none">Kiến Thức & Chỉ Huy.</h2>
                        
                        {/* TRANG QUẢN TRỊ TRỰC QUAN - XUẤT HIỆN KHI CLICK VÀO LOGO HOẶC THANH NAV */}
                        {showAdminPortal && (
                            <div className="liquid-card rounded-3xl p-6 md:p-10 border-orange-500/30 mb-16 bg-zinc-950/95 shadow-2xl transition-all duration-500">
                                <div className="flex items-center justify-between border-b border-white/10 pb-4 mb-6">
                                    <h3 className="text-xs font-bold uppercase tracking-widest text-orange-400">Trình Quản Trị Hệ Thống Content CMS & Thiết Kế Thương Hiệu</h3>
                                    <span className="text-[9px] bg-orange-500/10 border border-orange-500/30 text-orange-400 px-2 py-0.5 rounded-full uppercase font-bold">Admin Terminal Connected</span>
                                </div>
                                
                                {/* Cấu hình Thay đổi Logo */}
                                <form onSubmit={handleSaveLogo} className="mb-8 p-4 bg-white/5 rounded-xl border border-white/5 flex gap-4 items-center">
                                    <input type="text" placeholder="Dán link ảnh URL để thay thế logo điều hướng..." value={inputLogo} onChange={e => setInputLogo(e.target.value)} className="flex-1 p-3 rounded-lg admin-form-input text-xs" />
                                    <button type="submit" className="px-4 py-3 rounded-lg bg-white text-black font-bold text-[10px] tracking-widest uppercase hover:bg-orange-500 hover:text-white transition-colors">Cập Nhật Logo</button>
                                </form>

                                {/* Biểu mẫu Đăng bài viết chuẩn SEO */}
                                <form onSubmit={handlePublishSEO} className="flex flex-col gap-6">
                                    <input type="text" placeholder="Nhập Tiêu đề bài viết (Thẻ H1 hỗ trợ Google Index)" value={editTitle} onChange={e => setEditTitle(e.target.value)} className="w-full p-4 rounded-xl admin-form-input text-sm font-semibold uppercase tracking-wider" />
                                    <input type="text" placeholder="Mô tả tóm tắt nội dung bài viết (Thẻ Meta Description)" value={editDesc} onChange={e => setEditDesc(e.target.value)} className="w-full p-4 rounded-xl admin-form-input text-xs" />
                                    
                                    {/* Hộp định dạng văn bản trực quan */}
                                    <div className="flex flex-wrap gap-3 items-center bg-white/5 p-3 rounded-xl border border-white/5">
                                        <button type="button" onClick={() => setTextFormat(p => ({ ...p, bold: !p.bold }))} className={'px-3 py-1 text-xs rounded border border-white/10 font-bold ' + (textFormat.bold ? 'bg-white text-black' : 'text-white')}>Đậm</button>
                                        <button type="button" onClick={() => setTextFormat(p => ({ ...p, italic: !p.italic }))} className={'px-3 py-1 text-xs rounded border border-white/10 italic ' + (textFormat.italic ? 'bg-white text-black' : 'text-white')}>Nghiêng</button>
                                        <select value={textFormat.align} onChange={e => setTextFormat(p => ({ ...p, align: e.target.value }))} className="bg-zinc-900 text-white text-xs border border-white/10 rounded p-1 focus:outline-none">
                                            <option value="left">Căn Trái</option>
                                            <option value="center">Căn Giữa</option>
                                            <option value="right">Căn Phải</option>
                                        </select>
                                        <select value={textFormat.size} onChange={e => setTextFormat(p => ({ ...p, size: e.target.value }))} className="bg-zinc-900 text-white text-xs border border-white/10 rounded p-1 focus:outline-none">
                                            <option value="14px">Cỡ Nhỏ</option>
                                            <option value="16px">Cỡ Tiêu Chuẩn</option>
                                            <option value="22px">Cỡ Lớn (H2)</option>
                                            <option value="30px">Cỡ Siêu Lớn (H1)</option>
                                        </select>
                                        <select value={textFormat.color} onChange={e => setTextFormat(p => ({ ...p, color: e.target.value }))} className="bg-zinc-900 text-white text-xs border border-white/10 rounded p-1 focus:outline-none">
                                            <option value="#ffffff">Chữ Trắng</option>
                                            <option value="#f97316">Chữ Cam Thể Thao</option>
                                            <option value="#a1a1aa">Chữ Xám Định Hình</option>
                                        </select>
                                    </div>
                                    <textarea rows="5" placeholder="Viết nội dung bài viết chi tiết tại đây..." value={editContent} onChange={e => setEditContent(e.target.value)} className="w-full p-4 rounded-xl admin-form-input text-sm font-light leading-relaxed"></textarea>
                                    <button type="submit" className="px-8 py-4 rounded-full bg-orange-500 text-white font-bold text-[10px] tracking-widest uppercase self-end hover:bg-orange-600 transition-colors shadow-lg shadow-orange-500/20">Xuất Bản Bài Viết</button>
                                </form>
                            </div>
                        )}

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                            {posts.map((post, index) => (
                                <div key={index} className="liquid-card rounded-2xl p-6 flex flex-col justify-between">
                                    <div>
                                        <div className="text-[9px] uppercase tracking-widest text-white/30 font-bold font-body mb-2">{post.date}</div>
                                        <h3 className="font-heading italic text-3xl text-white tracking-wide mb-3 uppercase">{post.title}</h3>
                                        <p className="text-xs text-white/50 font-light leading-relaxed mb-6">{post.desc}</p>
                                        <div className="border-t border-white/5 pt-4 text-xs font-light leading-relaxed font-body text-white/90" dangerouslySetInnerHTML={{ __html: post.content }}></div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        // FOOTER CHUẨN SEO ĐA CỘT TÍNH TOÁN & KHỐI TIỆN ÍCH FACEBOOK WIDGET KÍNH LỎNG ĐỔ BÓNG TẦNG TẦNG
        const ComponentFooterAthletics = () => {
            const [fbPageUrl, setFbPageUrl] = useState('https://facebook.com/pulse.run');
            return (
                <footer className="relative w-full pt-32 pb-16 px-6 md:px-16 border-t border-white/5 bg-zinc-950/60 z-10 font-body">
                    <div className="max-w-6xl mx-auto w-full grid grid-cols-1 md:grid-cols-12 gap-12 mb-20">
                        <div className="md:col-span-4">
                            <div className="font-heading text-3xl italic tracking-tighter font-black text-white mb-6 uppercase">pulse.run</div>
                            <p className="text-xs text-white/40 font-light leading-relaxed max-w-sm">Nền tảng công nghệ cơ sinh học chạy bộ hàng đầu châu Á. Định hình sải chân thế hệ mới dựa trên dữ liệu dữ liệu phần cứng nâng cao.</p>
                        </div>
                        <div className="md:col-span-4 grid grid-cols-2 gap-4">
                            <div>
                                <h5 className="text-[10px] font-bold uppercase tracking-widest text-white/60 mb-4">Vị Trí Trạm Nodes</h5>
                                <p className="text-xs text-white/40 font-light leading-relaxed">Khu Công Nghệ Cao,<br/>Thành Phố Hồ Chí Minh,<br/>Việt Nam.</p>
                            </div>
                            <div>
                                <h5 className="text-[10px] font-bold uppercase tracking-widest text-white/60 mb-4">Liên Hệ</h5>
                                <p className="text-xs text-white/40 font-light">Hotline: 1900 PULSE<br/>Mail: ops@pulse.run</p>
                            </div>
                        </div>
                        <div className="md:col-span-4 flex flex-col justify-between items-start md:items-end">
                            <div className="w-full max-w-[280px] liquid-card rounded-2xl p-4 text-left border-white/10">
                                <div className="flex items-center gap-3 mb-3">
                                    <div className="w-7 h-7 rounded-full bg-blue-600/20 border border-blue-500/40 flex items-center justify-center text-xs font-bold text-blue-400 font-body">f</div>
                                    <div>
                                        <div className="text-[11px] font-bold tracking-wide text-white/90">PULSE RUNNING CLUB</div>
                                        <div className="text-[9px] text-white/40 font-body">145,000 Vận Động Viên</div>
                                    </div>
                                </div>
                                <input type="text" value={fbPageUrl} onChange={e => setFbPageUrl(e.target.value)} className="w-full p-2 rounded bg-black/50 border border-white/5 text-[9px] text-white/40 mb-3 focus:outline-none focus:border-white/20 font-body" />
                                <a href={fbPageUrl} target="_blank" rel="noopener noreferrer" className="w-full py-2 bg-white/5 border border-white/10 text-center block text-[10px] font-bold tracking-widest text-white rounded-lg hover:bg-white hover:text-black transition-colors uppercase">Ghé Thăm Fanpage</a>
                            </div>
                        </div>
                    </div>
                    <div className="max-w-6xl mx-auto w-full border-t border-white/5 pt-8 flex flex-col md:flex-row justify-between items-center gap-4 select-none opacity-30 text-[10px] font-medium tracking-widest text-white/60">
                        <span>© 2026 PULSE.RUN. ALL RIGHTS RESERVED.</span>
                        <span>SIÊU NỀN TẢNG THỂ THAO THẾ HỆ MỚI</span>
                    </div>
                </footer>
            );
        };

        // BỘ ĐIỀU PHỐI TRẠNG THÁI VÀ KHỞI CHẠY KHÔNG GIAN (APP LAYOUT ENGINES)
        const App = () => {
            const [appState, setAppState] = useState({ activeSection: 0 });
            const [showAdminPortal, setShowAdminPortal] = useState(false);
            const [logoImage, setLogoImage] = useState('https://images.unsplash.com/photo-1476480862126-209bfaa8edc8?auto=format&fit=crop&w=150&q=80');
            
            const listRefs = [useRef(null), useRef(null), useRef(null), useRef(null), useRef(null)];
            
            const changeSection = (idx) => {
                setAppState({ activeSection: idx });
                if (listRefs[idx] && listRefs[idx].current) {
                    listRefs[idx].current.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            };
            const toggleAdminPortal = () => setShowAdminPortal(!showAdminPortal);

            return (
                <AppContext.Provider value={{ appState, changeSection, logoImage, setLogoImage, showAdminPortal, toggleAdminPortal }}>
                    <main className="relative w-full bg-[#030305] overflow-hidden">
                        <FutureNavCommand />
                        <div ref={listRefs[0]}><SectionHeroAura /></div>
                        <div ref={listRefs[1]}><ComponentAboutHome /><ComponentProductsExhibition /></div>
                        <div ref={listRefs[2]}><ComponentKnowledgeCMS /></div>
                        <div ref={listRefs[3]}><ComponentFooterAthletics /></div>
                    </main>
                </AppContext.Provider>
            );
        };

        const rootContainer = ReactDOM.createRoot(document.getElementById('root'));
        rootContainer.render(<App />);
    </script>
</body>
</html>
