<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PULSE — Elevate Your Run</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;600;800&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { heading: ['"Instrument Serif"', 'serif'], body: ['"Barlow"', 'sans-serif'] } } } }
    </script>
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Barlow', sans-serif; overflow-x: hidden; }
        .will-change-transform { will-change: transform, opacity; transform-style: preserve-3d; perspective: 1000px; }
        .glass-panel { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
    </style>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
    <script src="https://unpkg.com/framer-motion@11.11.17/dist/framer-motion.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useRef } = React;
        const { motion } = window.FramerMotion;
        const TiltCard = ({ children, className }) => {
            const cardRef = useRef(null);
            const [rotateX, setRotateX] = useState(0);
            const [rotateY, setRotateY] = useState(0);
            const handleMouseMove = (e) => {
                const card = cardRef.current; if (!card) return;
                const rect = card.getBoundingClientRect();
                const mouseX = e.clientX - rect.left - rect.width / 2;
                const mouseY = e.clientY - rect.top - rect.height / 2;
                setRotateX((-mouseY / (rect.height / 2)) * 12);
                setRotateY((mouseX / (rect.width / 2)) * 12);
            };
            const handleMouseLeave = () => { setRotateX(0); setRotateY(0); };
            return (
                <motion.div ref={cardRef} onMouseMove={handleMouseMove} onMouseLeave={handleMouseLeave} animate={{ rotateX, rotateY }} transition={{ type: "spring", stiffness: 300, damping: 25 }} className={`will-change-transform ${className}`}>{children}</motion.div>
            );
        };
        const App = () => {
            return (
                <div className="min-h-screen px-4 md:px-12 py-8 flex flex-col justify-between max-w-7xl mx-auto">
                    <header className="flex justify-between items-center mb-12">
                        <div className="text-2xl font-extrabold tracking-tighter text-white">PULSE<span className="text-lime-400">.</span></div>
                        <button className="px-5 py-2 bg-white text-black text-xs font-bold rounded-full uppercase tracking-wider hover:bg-lime-400 transition-all">Khám Phá</button>
                    </header>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 items-stretch">
                        <div className="md:col-span-2 flex flex-col justify-center p-8 rounded-[2rem] bg-gradient-to-br from-neutral-900 to-black border border-white/5 min-h-[320px]">
                            <span className="text-xs text-lime-400 font-bold tracking-widest uppercase mb-4">// THẾ HỆ CHẠY BỘ MỚI 2026</span>
                            <h1 className="text-5xl md:text-7xl font-extrabold tracking-tight leading-none uppercase">Đột phá <br /><span className="font-heading italic font-light text-lime-400 lowercase text-6xl md:text-8xl">giới hạn</span> tốc độ.</h1>
                        </div>
                        <TiltCard className="glass-panel p-6 rounded-[2rem] flex flex-col justify-between relative overflow-hidden min-h-[320px]">
                            <h3 className="text-2xl font-bold">AERO-FLY X1</h3>
                            <div className="my-2 flex justify-center items-center h-28">
                                <div className="w-44 h-16 bg-gradient-to-r from-lime-400 to-emerald-500 rounded-tr-[3rem] rounded-bl-[1.5rem] flex items-center justify-center font-bold text-black text-xs">ENERGY FOAM</div>
                            </div>
                        </TiltCard>
                        <TiltCard className="glass-panel p-6 rounded-[2rem] flex flex-col justify-between min-h-[260px]">
                            <span className="text-xs text-white/60 uppercase font-medium">Chỉ số phản hồi lực</span>
                            <span className="text-6xl font-black text-white">98.4%</span>
                        </TiltCard>
                        <div className="relative overflow-hidden rounded-[2rem] bg-neutral-950 border border-white/5 p-8 min-h-[260px]">
                            <h4 className="text-lg font-bold mb-2">Cấu trúc vi mô Carbon</h4>
                            <p className="text-xs text-white/50">Tăng cường độ dẻo đàn hồi dọc thân giày.</p>
                        </div>
                        <div className="glass-panel p-8 rounded-[2rem] flex flex-col justify-between items-start min-h-[260px]">
                            <h3 className="text-xl font-bold">Sẵn sàng trải nghiệm?</h3>
                            <button className="w-full py-4 bg-lime-400 text-black text-sm font-bold rounded-xl uppercase tracking-wider hover:bg-white transition-all">Đặt Chỗ Ngay</button>
                        </div>
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
