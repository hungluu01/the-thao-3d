<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YÊU CHẠY BỘ | Hệ Sinh Thái Động Lực Học</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.12/babel.min.js" crossorigin></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,300;0,500;0,700;1,800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        heading: ['"Instrument Serif"', 'serif'],
                        body: ['"Barlow"', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #020204;
            color: #ffffff;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            font-family: 'Barlow', sans-serif;
        }
        /* Tối ưu thanh cuộn */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #020204; }
        ::-webkit-scrollbar-thumb { background: rgba(249, 115, 22, 0.4); border-radius: 99px; }

        /* ĐỊNH DẠNG KHỐI KÍNH GLASSMORPHISM LÊN TRÊN NỀN HẠT */
        .glass-ui-panel {
            background: rgba(10, 10, 15, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8), inset 0 1px 0px rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .glass-ui-panel:hover {
            border-color: rgba(249, 115, 22, 0.3);
            background: rgba(15, 15, 22, 0.75);
        }
        
        /* HIỆU ỨNG CHỮ PHÁT SÁNG */
        .orange-neon-glow {
            text-shadow: 0 0 30px rgba(249, 115, 22, 0.6);
        }

        /* NỀN CANVAS BACKGROUND ĐƯỢC ĐẨY RA SAU CÙNG */
        .telemetry-bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0; /* Ép nằm dưới */
            pointer-events: none;
        }

        /* LỚP CHỨA CORE INTERFACE REACT */
        #root {
            position: relative;
            z-index: 10; /* Ép nổi lên trên nền hạt */
            width: 100%;
        }
        
        .input-dark-field {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            transition: all 0.3s ease;
        }
        .input-dark-field:focus {
            border-color: #f97316;
            outline: none;
            background: rgba(249, 115, 22, 0.02);
        }
    </style>
</head>
<body>

    <div class="telemetry-bg-canvas">
        <canvas id="runningTelemetryNet"></canvas>
    </div>

    <div id="root"></div>

    <script>
        const canvas = document.getElementById('runningTelemetryNet');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const particles = [];
        const particleCount = 85;

        for (let i = 0; i < particleCount; i++) {
            particles.push({
                x: Math.random() * width,
                y: Math.random() * height,
                speedX: Math.random() * 1.5 + 0.5,
                speedY: (Math.random() - 0.5) * 0.4,
                radius: Math.random() * 2 + 0.5,
                alpha: Math.random() * 0.5 + 0.2
            });
        }

        function animateTelemetryNet() {
            ctx.clearRect(0, 0, width, height);
            
            // Vẽ lưới mờ nhẹ tạo không gian sâu
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.01)';
            ctx.lineWidth = 1;
            for(let x = 0; x < width; x += 80) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke();
            }

            // Di chuyển và vẽ hạt
            particles.forEach(p => {
                p.x += p.speedX;
                p.y += p.speedY;

                if (p.x > width) p.x = 0;
                if (p.y > height || p.y < 0) p.y = Math.random() * height;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(249, 115, 22, ${p.alpha})`;
                ctx.fill();
            });

            requestAnimationFrame(animateTelemetryNet);
        }
        animateTelemetryNet();

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef, createContext, useContext } = React;
        const AppContext = createContext();

        // 1. FIXED NAV BAR (THANH MENU ĐIỀU HƯỚNG LƠ LỬNG)
        const FloatingNavbar = () => {
            const { logoUrl, scrollToSection, sectionRefs } = useContext(AppContext);
            return (
                <nav className="fixed top-5 left-1/2 -translate-x-1/2 w-[92%] max-w-6xl z-50 flex items-center justify-between px-6 py-4 glass-ui-panel rounded-full bg-black/40">
                    <div className="flex items-center gap-3">
                        <div className="w-8 h-8 rounded-full border border-orange-500/40 overflow-hidden bg-orange-500/10">
                            <img src={logoUrl} alt="Logo" className="w-full h-full object-cover" />
                        </div>
                        <span className="font-body font-bold text-xs uppercase tracking-[0.2em] text-white">YÊU CHẠY BỘ<span className="text-orange-500">.NET</span></span>
                    </div>
                    <div className="hidden md:flex items-center gap-1">
                        {['Trang Chủ', 'Trang Bị', 'Tính Toán Pace', 'Quản Trị CMS'].map((item, idx) => (
                            <button key={idx} onClick={() => scrollToSection(idx)} className="px-4 py-1 text-[10px] font-bold tracking-widest uppercase text-white/60 hover:text-orange-500 transition-colors">
                                {item}
                            </button>
                        ))}
                    </div>
                    <a href="https://strava.com" target="_blank" rel="noopener noreferrer" className="px-4 py-2 text-[9px] font-bold tracking-widest uppercase rounded-full bg-gradient-to-r from-orange-500 to-amber-600 text-white shadow-lg shadow-orange-500/20 hover:opacity-90 transition-opacity">
                        KẾT NỐI STRAVA
                    </a>
                </nav>
            );
        };

        // 2. HERO SECTION (TIÊU ĐỀ HOÀNH TRÁNG & KHỐI CHỈ SỐ CƠ SINH HỌC)
        const HeroSection = () => {
            const { metricsData } = useContext(AppContext);
            return (
                <section className="relative w-full min-h-screen flex flex-col justify-center items-center pt-32 pb-16 px-6">
                    <div className="max-w-5xl text-center flex flex-col items-center">
                        <div className="px-4 py-1 rounded-full bg-orange-500/10 border border-orange-500/20 text-[9px] font-bold tracking-widest uppercase text-orange-400 mb-6">
                            // MẠNG LƯỚI TRI THỨC VÀ ĐỘNG LỰC HỌC CHẠY BỘ ĐƯỜNG TRƯỜNG
                        </div>
                        <h1 className="text-5xl md:text-8xl font-heading italic text-white leading-[0.95] tracking-tighter max-w-4xl uppercase mb-6">
                            Yêu Chạy Bộ <br/><span className="text-orange-500 orange-neon-glow">Bứt Phá</span> Mọi Giới Hạn
                        </h1>
                        <p className="text-xs md:text-sm text-white/50 font-light max-w-xl leading-relaxed mb-12 tracking-wide font-body">
                            Không gian lưu trữ giáo án huấn luyện từ cự ly ngắn đến siêu marathon. Theo dõi sát sao các chỉ số cơ sinh học nâng cao để cải thiện sải chân an toàn và tối ưu hóa hiệu suất.
                        </p>
                        
                        {/* 4 Khối Số Liệu Trực Quan Đè Lên Canvas */}
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 w-full max-w-4xl">
                            {metricsData.map((data, i) => (
                                <div key={i} className="glass-ui-panel rounded-2xl p-5 text-left">
                                    <div className="text-[9px] text-white/40 uppercase tracking-widest font-bold font-body">{data.title}</div>
                                    <div className="text-3xl font-heading italic font-bold text-white mt-1 flex items-baseline gap-1">
                                        {data.value} <span className="text-[10px] font-body text-orange-500 tracking-normal font-normal">{data.unit}</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        // 3. GEAR COLLECTION SECTION
        const GearSection = () => {
            const items = [
                { title: 'AeroStride Carbon Pro', tags: 'Marathon Race Shoe', desc: 'Đế đệm siêu bọt khí tích hợp tấm carbon nguyên khối hỗ trợ phản hồi lực cực cao trên mỗi bước đáp.' },
                { title: 'Apex Hydration Vest', tags: 'Trail Running Gear', desc: 'Hệ thống đai ôm sát công thái học dung tích 5L, tối ưu vị trí bình nước mềm chống rung lắc tuyệt đối.' }
            ];
            return (
                <section className="relative w-full py-24 px-6 max-w-6xl mx-auto">
                    <span className="text-[10px] font-bold tracking-widest uppercase text-orange-500 block mb-2">// DANH MỤC TRANG BỊ CHUYÊN SÂU</span>
                    <h2 className="font-heading italic text-4xl md:text-6xl text-white tracking-tight mb-12 uppercase">Trợ Thủ Đường Đua.</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {items.map((gear, idx) => (
                            <div key={idx} className="glass-ui-panel rounded-3xl p-8 flex flex-col justify-between min-h-[220px]">
                                <div>
                                    <span className="text-[9px] font-mono uppercase tracking-widest text-white/40">{gear.tags}</span>
                                    <h3 className="font-heading italic text-3xl text-white uppercase tracking-wide mt-1 mb-3">{gear.title}</h3>
                                    <p className="text-xs text-white/50 font-light leading-relaxed font-body">{gear.desc}</p>
                                </div>
                            </div>
                        ))}
                    </div>
                </section>
            );
        };

        // 4. PACE CALCULATOR UTILITY
        const PaceCalculatorSection = () => {
            const [km, setKm] = useState(5);
            const [min, setMin] = useState(30);
            const [pace, setPace] = useState('6:00');

            useEffect(() => {
                if(km > 0 && min > 0) {
                    const totalSec = (min * 60) / km;
                    const pMin = Math.floor(totalSec / 60);
                    const pSec = Math.round(totalSec % 60);
                    setPace(`${pMin}:${pSec < 10 ? '0' + pSec : pSec}`);
                }
            }, [km, min]);

            return (
                <section className="relative w-full py-20 px-6 max-w-6xl mx-auto">
                    <div className="glass-ui-panel rounded-3xl p-8 grid grid-cols-1 lg:grid-cols-12 gap-8 items-center">
                        <div className="lg:col-span-5">
                            <span className="text-[10px] font-bold tracking-widest uppercase text-orange-500 block mb-1">// TIỆN ÍCH CHO VẬN ĐỘNG VIÊN</span>
                            <h2 className="font-heading italic text-4xl text-white tracking-tight uppercase mb-2">Tính Toán Tốc Độ Chạy (Pace)</h2>
                            <p className="text-xs text-white/40 font-light font-body">Xác định tốc độ mục tiêu chuẩn xác cho từng bài chạy biến tốc hoặc chạy bền tích lũy.</p>
                        </div>
                        <div className="lg:col-span-7 grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
                            <div>
                                <label className="text-[9px] uppercase tracking-widest text-white/50 block mb-1.5 font-bold font-body">Cự Ly Chạy (KM)</label>
                                <input type="number" value={km} onChange={e => setKm(parseFloat(e.target.value) || 0)} className="w-full p-3 rounded-xl input-dark-field text-sm font-bold font-mono text-orange-500" />
                            </div>
                            <div>
                                <label className="text-[9px] uppercase tracking-widest text-white/50 block mb-1.5 font-bold font-body">Thời Gian (Phút)</label>
                                <input type="number" value={min} onChange={e => setMin(parseInt(e.target.value) || 0)} className="w-full p-3 rounded-xl input-dark-field text-sm font-bold font-mono text-orange-500" />
                            </div>
                            <div className="p-3 bg-orange-500/10 border border-orange-500/20 rounded-xl text-center md:text-left">
                                <div className="text-[9px] uppercase tracking-widest text-orange-400 font-bold font-body">Pace Trung Bình</div>
                                <div className="text-3xl font-heading italic font-bold text-white mt-0.5">{pace} <span className="text-[10px] font-body text-white/40 font-normal">/km</span></div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        // 5. CMS MANAGEMENT HUB & KNOWLEDGE LIST
        const CMSManagementSection = () => {
            const { blogPosts, setBlogPosts, logoUrl, setLogoUrl } = useContext(AppContext);
            const [title, setTitle] = useState('');
            const [desc, setDesc] = useState('');
            const [txtLogo, setTxtLogo] = useState(logoUrl);

            const handlePublish = (e) => {
                e.preventDefault();
                if(!title || !desc) return alert('Vui lòng điền đủ Tiêu đề và Mô tả giáo án!');
                
                const newPost = {
                    title: title,
                    desc: desc,
                    date: new Date().toLocaleDateString('vi-VN')
                };
                const nextList = [newPost, ...blogPosts];
                setBlogPosts(nextList);
                localStorage.setItem('yeuchaybo_data_v6', JSON.stringify(nextList));
                setTitle(''); setDesc('');
            };

            return (
                <section className="relative w-full py-20 px-6 max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-10 items-start">
                    
                    {/* KHỐI ĐIỀU KHIỂN CMS CHỦ ĐỘNG */}
                    <div className="lg:col-span-5 glass-ui-panel rounded-2xl p-6 bg-zinc-950/80 lg:sticky lg:top-28">
                        <div className="border-b border-white/5 pb-3 mb-5">
                            <h3 className="text-xs font-bold uppercase tracking-widest text-orange-500 font-body">TRẠM ĐIỀU HÀNH THÔNG TIN</h3>
                            <p className="text-[10px] text-white/40 mt-0.5">Xuất bản tài liệu cẩm nang chạy bộ ngay lập tức</p>
                        </div>
                        
                        <div className="mb-5 pb-5 border-b border-white/5 flex flex-col gap-1.5">
                            <label className="text-[9px] uppercase tracking-widest text-white/40 block font-bold font-body">Đổi URL Logo Đại Diện</label>
                            <div className="flex gap-2">
                                <input type="text" value={txtLogo} onChange={e => setTxtLogo(e.target.value)} className="flex-1 p-2.5 rounded-xl input-dark-field text-xs font-mono" />
                                <button onClick={() => { setLogoUrl(txtLogo); alert('Cập nhật Logo thành công!') }} className="px-4 py-2 rounded-xl bg-white text-black font-bold text-[9px] uppercase tracking-widest hover:bg-orange-500 hover:text-white transition-colors">LƯU</button>
                            </div>
                        </div>

                        <form onSubmit={handlePublish} className="flex flex-col gap-4">
                            <div>
                                <label className="text-[9px] uppercase tracking-widest text-white/40 block mb-1 font-bold font-body">Tiêu Đề Giáo Án Chạy</label>
                                <input type="text" placeholder="Ví dụ: Kỹ thuật chạy MAF giữ nhịp tim thấp..." value={title} onChange={e => setTitle(e.target.value)} className="w-full p-3 rounded-xl input-dark-field text-xs font-medium" />
                            </div>
                            <div>
                                <label className="text-[9px] uppercase tracking-widest text-white/40 block mb-1 font-bold font-body">Nội Dung / Hướng Dẫn Tóm Tắt</label>
                                <textarea rows="3" placeholder="Nhập giáo trình huấn luyện chi tiết cho cộng đồng..." value={desc} onChange={e => setDesc(e.target.value)} className="w-full p-3 rounded-xl input-dark-field text-xs leading-relaxed"></textarea>
                            </div>
                            <button type="submit" className="w-full py-3 bg-orange-500 text-white font-bold text-[10px] tracking-widest uppercase rounded-xl hover:bg-orange-600 transition-colors">
                                CẬP NHẬT LÊN WEB FEED
                              </button>
                        </form>
                    </div>

                    {/* KHỐI FEED HIỂN THỊ BÀI VIẾT CHỮ */}
                    <div className="lg:col-span-7 flex flex-col gap-5 w-full">
                        <span className="text-[10px] font-bold tracking-widest uppercase text-white/30 block border-b border-white/5 pb-2 font-body">// CẨM NANG HUẤN LUYỆN CHUYÊN BIỆT</span>
                        {blogPosts.map((post, i) => (
                            <div key={i} className="glass-ui-panel rounded-xl p-6">
                                <div className="flex justify-between items-center mb-3">
                                    <span className="text-[9px] font-mono text-orange-400 bg-orange-500/5 border border-orange-500/10 px-2 py-0.5 rounded">{post.date}</span>
                                    <span className="text-[9px] text-white/30 tracking-widest uppercase font-bold font-body">Verified Guide</span>
                                </div>
                                <h4 className="font-heading italic text-2xl text-white uppercase tracking-wide mb-2">{post.title}</h4>
                                <p className="text-xs text-white/60 font-light leading-relaxed font-body">{post.desc}</p>
                            </div>
                        ))}
                    </div>
                </section>
            );
        };

        // 6. CHÂN TRANG FOOTER CHUẨN MỰC
        const FooterSection = () => {
            return (
                <footer className="relative w-full pt-16 pb-8 px-6 border-t border-white/5 bg-zinc-950/60 mt-12">
                    <div className="max-w-6xl mx-auto w-full flex flex-col md:flex-row justify-between items-center gap-6 text-center md:text-left">
                        <div>
                            <div className="font-heading text-2xl italic tracking-tight font-black text-white uppercase">YÊU CHẠY BỘ<span className="text-orange-500">.NET</span></div>
                            <p className="text-[11px] text-white/40 font-light mt-1 max-w-sm font-body">Cộng đồng kết nối khoa học sải chân, giáo án và chia sẻ niềm đam mê marathon bất tận.</p>
                        </div>
                        <div className="text-[9px] font-medium tracking-widest text-white/30 font-body">
                            © 2026 YEUCHAYBO.NET. KIẾN TẠO THỂ THAO VIỆT NAM CHUYÊN NGHIỆP.
                        </div>
                    </div>
                </footer>
            );
        };

        // ĐIỀU PHỐI LOGIC TOÀN CỤC CỦA HỆ THỐNG
        const MainApp = () => {
            const [logoUrl, setLogoUrl] = useState('https://images.unsplash.com/photo-1476480862126-209bfaa8edc8?auto=format&fit=crop&w=150&q=80');
            const [blogPosts, setBlogPosts] = useState(() => {
                const save = localStorage.getItem('yeuchaybo_data_v6');
                return save ? JSON.parse(save) : [
                    { title: 'Kế hoạch tích lũy nền tảng (Base Mileage) hiệu quả', desc: 'Phương pháp tập luyện vùng nhịp tim Zone 2 tối thiểu 4-6 tuần giúp phát triển mao mạch và tăng sức bền cơ tim bền bỉ trước khi bước vào giai đoạn siết tốc độ.', date: '31/05/2026' }
                ];
            });

            const metricsData = [
                { title: 'Guồng Chân Chuẩn', value: '180', unit: 'SPM' },
                { title: 'Thời Gian Tiếp Đất', value: '210', unit: 'ms' },
                { title: 'Độ Nảy Chiều Đứng', value: '6.5', unit: 'cm' },
                { title: 'Runner Đang Live', value: '5,240', unit: 'VĐV' }
            ];

            const sectionRefs = [useRef(null), useRef(null), useRef(null), useRef(null)];

            const scrollToSection = (idx) => {
                if(sectionRefs[idx] && sectionRefs[idx].current) {
                    sectionRefs[idx].current.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            };

            return (
                <AppContext.Provider value={{ logoUrl, setLogoUrl, blogPosts, setBlogPosts, metricsData, scrollToSection, sectionRefs }}>
                    <div className="w-full flex flex-col min-h-screen">
                        <FloatingNavbar />
                        <div ref={sectionRefs[0]}><HeroSection /></div>
                        <div ref={sectionRefs[1]}><GearSection /></div>
                        <div ref={sectionRefs[2]}><PaceCalculatorSection /></div>
                        <div ref={sectionRefs[3]}><CMSManagementSection /></div>
                        <FooterSection />
                    </div>
                </AppContext.Provider>
            );
        };

        // Khởi tạo root chuẩn của React 18 không sợ CORS hay lỗi biên dịch
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<MainApp />);
    </script>
</body>
</html>
