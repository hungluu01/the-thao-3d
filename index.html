        .running-canvas-container { position: fixed; inset: 0; pointer-events: none; z-index: 1; opacity: 0.9; }

        /* SÓNG CLICK CHUỘT QUANTUM RIPPLE */
        .ripple-layer {
            position: fixed; border-radius: 50%; pointer-events: none;
            transform: translate(-50%, -50%) scale(0); opacity: 1; z-index: 9999;
        }
        .ripple-core {
            border: 2px solid rgba(249, 115, 22, 0.6);
            background: radial-gradient(circle, rgba(249,115,22,0.2) 0%, rgba(0,0,0,0) 70%);
            animation: rippleAnimCore 0.7s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }
        .ripple-aura {
            border: 1px solid rgba(255, 255, 255, 0.12);
            animation: rippleAnimAura 0.9s cubic-bezier(0.1, 0.6, 0.2, 1) forwards;
        }
        @keyframes rippleAnimCore {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(14); opacity: 0; }
        }
        @keyframes rippleAnimAura {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0.7; }
            100% { transform: translate(-50%, -50%) scale(24); opacity: 0; }
        }

<body onmousedown="triggerQuantumRipple(event)">

    <div class="running-canvas-container">
        <canvas id="runningTelemetryNet"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('runningTelemetryNet');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const particles = [];
        const particleCount = 95;

        for (let i = 0; i < particleCount; i++) {
            particles.push({
                x: Math.random() * width,
                y: Math.random() * height,
                speedX: Math.random() * 1.8 + 0.6, 
                speedY: (Math.random() - 0.5) * 0.4,
                radius: Math.random() * 2.5 + 0.5,
                alpha: Math.random() * 0.6 + 0.2
            });
        }

        let mousePointer = { x: -1000, y: -1000 };
        document.addEventListener('mousemove', (e) => {
            mousePointer.x = e.clientX;
            mousePointer.y = e.clientY;
        });

        function animateTelemetryNet() {
            ctx.clearRect(0, 0, width, height);
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.015)';
            ctx.lineWidth = 1;
            for(let x = 0; x < width; x += 70) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke();
            }

            particles.forEach(p => {
                p.x += p.speedX;
                p.y += p.speedY;

                if (p.x > width) p.x = 0;
                if (p.y > height || p.y < 0) p.y = Math.random() * height;

                const dx = mousePointer.x - p.x;
                const dy = mousePointer.y - p.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if(dist < 130) {
                    p.x -= (dx / dist) * 2.5;
                    p.y -= (dy / dist) * 2.5;
                }

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(249, 115, 22, ${p.alpha})`; 
                ctx.fill();
            });

            requestAnimationFrame(animateTelemetryNet);
        }
        animateTelemetryNet();

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        function triggerQuantumRipple(e) {
            const core = document.createElement('div');
            core.className = 'ripple-layer ripple-core';
            core.style.left = `${e.clientX}px`; core.style.top = `${e.clientY}px`;
            core.style.width = '20px'; core.style.height = '20px';

            const aura = document.createElement('div');
            aura.className = 'ripple-layer ripple-aura';
            aura.style.left = `${e.clientX}px`; aura.style.top = `${e.clientY}px`;
            aura.style.width = '20px'; aura.style.height = '20px';

            document.body.appendChild(core);
            document.body.appendChild(aura);

            core.addEventListener('animationend', () => core.remove());
            aura.addEventListener('animationend', () => aura.remove());
        }
    </script>

        const SectionPaceCalculator = () => {
            const [distance, setDistance] = useState(5); // km
            const [timeMin, setTimeMin] = useState(30); // phút
            const [calculatedPace, setCalculatedPace] = useState('6:00');

                    const totalSeconds = (timeMin * 60) / distance;
                    const mins = Math.floor(totalSeconds / 60);
                    const secs = Math.round(totalSeconds % 60);

                                    <div className="border-t border-white/5 pt-3" dangerouslySetInnerHTML={{ __html: item.content }}></div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        // THANH CHÂN TRANG FOOTER CHUẨN ĐA CỘT
        const SectionAthleticsFooter = () => {
            return (
                <footer className="relative w-full pt-24 pb-12 px-6 md:px-16 border-t border-white/5 bg-zinc-950/70 z-10 font-body">
                    <div className="max-w-6xl mx-auto w-full grid grid-cols-1 md:grid-cols-12 gap-10 mb-16">
                        <div className="md:col-span-5">
                            <div className="font-heading text-3xl italic tracking-tight font-black text-white mb-4 uppercase">YÊU CHẠY BỘ<span className="text-orange-500">.NET</span></div>
                            <p className="text-xs text-white/40 font-light leading-relaxed max-w-sm">Nền tảng tri thức thể thao, kết nối Strava và theo dõi chỉ số khoa học chạy bộ hàng đầu dành cho các câu lạc bộ phong trào khắp Việt Nam.</p>
                        </div>
                        <div className="md:col-span-4 grid grid-cols-2 gap-4">
                            <div>
                                <h5 className="text-[10px] font-bold uppercase tracking-widest text-white/50 mb-3">Thông Tin</h5>
                                <p className="text-xs text-white/40 font-light leading-relaxed">Pulse Running Lab,<br/>Thành phố Hồ Chí Minh,<br/>Việt Nam.</p>
                            </div>
                            <div>
                                <h5 className="text-[10px] font-bold uppercase tracking-widest text-white/50 mb-3">Hỗ Trợ</h5>
                                <p className="text-xs text-white/40 font-light">Hotline: 1900 88 PULSE<br/>Mail: admin@yeuchaybo.net</p>
                            </div>
                        </div>
                        <div className="md:col-span-3 flex flex-col md:items-end">
                            <div className="w-full max-w-[260px] glass-runner-ui rounded-2xl p-4 bg-black/30">
                                <span className="text-[10px] font-bold text-orange-500 uppercase block mb-1">Cộng Đồng Runner</span>
                                <div className="text-[11px] font-light text-white/50 mb-3">Đồng hành cùng 150.000+ thành viên trên Facebook.</div>
                                <a href="https://facebook.com" target="_blank" rel="noopener noreferrer" className="w-full py-2 bg-white/5 border border-white/10 text-center block text-[9px] font-bold tracking-widest text-white rounded-lg hover:bg-orange-500 hover:border-orange-500 transition-colors uppercase">Tham Gia Group</a>
                            </div>
                        </div>
                    </div>
                    <div className="max-w-6xl mx-auto w-full border-t border-white/5 pt-6 text-center md:text-left text-[9px] font-medium tracking-widest text-white/30 select-none">
                        © 2026 YEUCHAYBO.NET. PHÁT TRIỂN VÌ SỨC KHỎE CỘNG ĐỒNG RUNNER VIỆT NAM.
                    </div>
                </footer>
            );
        };

        // ĐIỀU PHỐI LOGIC TOÀN CỤC CỦA HỆ THỐNG
        const MainAthleticsApp = () => {
            const [appState, setAppState] = useState({ currentSection: 0 });
            const [logoUrl, setLogoUrl] = useState('https://images.unsplash.com/photo-1476480862126-209bfaa8edc8?auto=format&fit=crop&w=150&q=80');
            
            const [runningArticles, setRunningArticles] = useState(() => {
                const data = localStorage.getItem('yeuchaybo_articles_v5');
                return data ? JSON.parse(data) : [
                    { title: 'Giáo án chạy bộ 21K (Half Marathon) dưới 2 giờ', desc: 'Bí quyết phân phối thể lực và tốc độ Pace tối ưu cho mục tiêu Sub 2 đỉnh cao.', content: 'Để hoàn thành 21.097km dưới 2 tiếng, bạn cần duy trì tốc độ Pace trung bình ổn định ở mức 5:40 phút/km. Hãy bắt đầu 3km đầu tiên ở mức Pace 5:50 để làm nóng cơ bắp, tích lũy năng lượng, sau đó siết đều guồng chân ở vùng nhịp tim Zone 3...', date: '31/05/2026' }
                ];
            });

            const telemetryStats = [
                { metrics: 'Guồng Chân Tối Ưu', value: '180', unit: 'SPM' },
                { metrics: 'Thời Gian Tiếp Đất', value: '205', unit: 'ms' },
                { metrics: 'Độ Nảy Chiều Đứng', value: '6.2', unit: 'cm' },
                { metrics: 'Thành Viên Đang Chạy', value: '4,820', unit: 'Live' }
            ];

            const sectionRefs = [useRef(null), useRef(null), useRef(null), useRef(null)];

            const changeSection = (index) => {
                setAppState({ currentSection: index });
                if(sectionRefs[index] && sectionRefs[index].current) {
                    sectionRefs[index].current.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            };

            return (
                <AppContext.Provider value={{ appState, changeSection, logoUrl, setLogoUrl, runningArticles, setRunningArticles, telemetryStats }}>
                    <main className="relative w-full overflow-hidden">
                        <NavigationBarRunner />
                        <div ref={sectionRefs[0]}><SectionAthleticsHero /></div>
                        <div ref={sectionRefs[1]}><SectionShoeCollection /></div>
                        <div ref={sectionRefs[2]}><SectionPaceCalculator /><SectionManagementCMS /></div>
                        <div ref={sectionRefs[3]}><SectionAthleticsFooter /></div>
                    </main>
                </AppContext.Provider>
            );
        };

        const rootNode = ReactDOM.createRoot(document.getElementById('root'));
        rootNode.render(<MainAthleticsApp />);
    </script>
</body>
